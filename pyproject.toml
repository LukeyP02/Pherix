[project]
name = "pherix"
version = "0.0.0"
description = "A transactional resource runtime for AI agents"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = ["pytest"]
# Real-agent dogfoods only (examples/dogfood/). The library itself stays
# dependency-free — this extra is never needed to import or use pherix, only
# to run the keyed real-agent scripts.
dogfood = ["anthropic"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pherix"]

[tool.pytest.ini_options]
testpaths = ["tests"]
