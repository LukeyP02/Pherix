<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pherix — watch an agent get governed, live</title>
<meta name="description" content="A recorded agent session: wrap the agent, run it, watch Pherix govern every tool call, and see a $480k irreversible payment held at the gate. Plays offline." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0b0e;
    --panel: #121419;
    --panel-2: #181b22;
    --ink: #e8ebf1;
    --ink-2: #99a2b2;
    --ink-3: #5a6271;
    --ink-4: #383e49;
    --rule: #232730;
    --green: #5ad17f;
    --amber: #e0b341;
    --red: #e56854;
    --accent: #6ea8fe;
    --glow: rgba(90, 209, 127, 0.10);
  }
  * { box-sizing: border-box; }
  html { margin: 0; padding: 0; background: var(--bg); }
  body { margin: 0; padding: 0; background: transparent; color: var(--ink); }
  body {
    font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* atmosphere — a static dotted field, masked */
  .bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
  .bg::before {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(150,162,186,0.30) 1.1px, transparent 1.6px);
    background-size: 30px 30px;
    -webkit-mask-image: radial-gradient(120% 90% at 50% 25%, #000 35%, transparent 90%);
            mask-image: radial-gradient(120% 90% at 50% 25%, #000 35%, transparent 90%);
  }

  /* ── the player shell ───────────────────────────────────────── */
  .player {
    width: 100%; max-width: 1080px;
    border: 1px solid var(--rule); border-radius: 12px; overflow: hidden;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    box-shadow: 0 24px 60px -28px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.01) inset;
    opacity: 0; animation: rise .7s .05s ease forwards;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* title strip — the phase playlist */
  .strip {
    display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap;
    padding: 0.85rem 1.1rem; border-bottom: 1px solid var(--rule);
    font-size: 0.82rem;
  }
  .strip .dots { display: flex; gap: 6px; margin-right: 0.4rem; }
  .strip .dots i { width: 9px; height: 9px; border-radius: 50%; display: block; }
  .strip .dots i:nth-child(1){ background:#e5685433; }
  .strip .dots i:nth-child(2){ background:#e0b34133; }
  .strip .dots i:nth-child(3){ background:#5ad17f33; }
  .strip .step {
    background: none; border: 0; padding: 0; cursor: pointer; font: inherit;
    color: var(--ink-3); letter-spacing: 0.02em; transition: color .25s ease;
  }
  .strip .step:hover { color: var(--ink-2); }
  .strip .step.on { color: var(--green); font-weight: 700; }
  .strip .step.done { color: var(--ink-2); }
  .strip .sep { color: var(--ink-4); }
  .strip .spacer { flex: 1; }
  .strip .ctrl {
    background: none; border: 1px solid var(--rule); border-radius: 6px;
    color: var(--ink-2); font: inherit; font-size: 0.78rem; cursor: pointer;
    padding: 0.25rem 0.7rem; transition: border-color .18s ease, color .18s ease;
  }
  .strip .ctrl:hover { border-color: var(--green); color: var(--green); }

  /* title row */
  .head { padding: 1.1rem 1.7rem 0.4rem; }
  .head .ttl { font-size: 1.04rem; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); margin: 0; }
  .head .cap { color: var(--ink-2); font-size: 0.88rem; margin: 0.45rem 0 0; min-height: 1.4em; transition: opacity .3s ease; }
  .head .cap b { color: var(--green); font-weight: 700; }

  .screen { padding: 1.1rem 1.7rem 1.4rem; min-height: clamp(360px, 52vh, 540px); }

  /* ── PHASE 1: the wrap (code diff) ──────────────────────────── */
  .code {
    background: #0c0e13; border: 1px solid var(--rule); border-radius: 10px;
    padding: 1.1rem 1.3rem; font-size: clamp(0.78rem, 1.7vw, 0.92rem); line-height: 1.75;
    overflow-x: auto;
  }
  .code .cl { display: block; white-space: pre; color: var(--ink); transition: background .4s ease, color .4s ease; border-radius: 3px; padding: 0 0.3rem; margin: 0 -0.3rem; }
  .code .cl.blank { min-height: 1.75em; }
  .code .cl.added {
    background: rgba(90,209,127,0.12); color: var(--green);
    box-shadow: inset 2px 0 0 var(--green);
    opacity: 0; animation: linein .5s ease forwards;
  }
  .code .cl.changed {
    background: rgba(110,168,254,0.10); color: var(--accent);
    box-shadow: inset 2px 0 0 var(--accent);
    opacity: 0; animation: linein .5s ease forwards;
  }
  .code .cmt { color: var(--ink-3); }
  @keyframes linein { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

  /* ── PHASES 2–3: the two-column run ─────────────────────────── */
  .cols2 { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 1.1rem; }
  @media (max-width: 720px) { .cols2 { grid-template-columns: 1fr; } }
  .pane { border: 1px solid var(--rule); border-radius: 10px; background: var(--panel); overflow: hidden; display: flex; flex-direction: column; }
  .pane .ph {
    font-size: 0.66rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--ink-4);
    padding: 0.7rem 1rem; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center;
  }
  .pane .ph .live { color: var(--green); display: inline-flex; align-items: center; gap: 0.4rem; }
  .pane .ph .live::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.4s ease-in-out infinite; }
  .pane .ph .live.stop { color: var(--red); }
  .pane .ph .live.stop::before { background: var(--red); box-shadow: 0 0 8px var(--red); animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pane .body { padding: 0.9rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.7rem; min-height: 220px; }

  /* conversation bubbles */
  .msg { opacity: 0; transform: translateY(6px); animation: linein .4s ease forwards; max-width: 92%; }
  .msg .who { font-size: 0.64rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-4); margin-bottom: 0.2rem; }
  .msg .txt {
    font-size: 0.86rem; line-height: 1.5; padding: 0.6rem 0.8rem; border-radius: 8px;
    background: var(--panel-2); border: 1px solid var(--rule); color: var(--ink);
  }
  .msg.user { align-self: flex-end; margin-left: auto; }
  .msg.user .who { text-align: right; color: var(--accent); }
  .msg.user .txt { background: rgba(110,168,254,0.08); border-color: rgba(110,168,254,0.3); }
  .msg.agent .who { color: var(--green); }
  .msg.gateflag { max-width: 100%; }
  .msg.gateflag .who { color: var(--red); }
  .msg.gateflag .txt { background: rgba(229,104,84,0.10); border-color: var(--red); color: var(--ink); }
  .msg.gateflag .txt::before { content: "⨯ HELD AT GATE — "; color: var(--red); font-weight: 700; }

  /* governance rows */
  .grow {
    opacity: 0; transform: translateY(6px); animation: linein .4s ease forwards;
    border: 1px solid var(--rule); border-radius: 8px; padding: 0.6rem 0.75rem;
    background: var(--panel-2); transition: background .4s ease, border-color .4s ease, box-shadow .4s ease;
  }
  .grow .top { display: flex; align-items: baseline; justify-content: space-between; gap: 0.6rem; }
  .grow .tool { font-size: 0.84rem; color: var(--ink); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .grow .res { font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); border: 1px solid var(--ink-4); border-radius: 4px; padding: 0.05rem 0.4rem; white-space: nowrap; }
  .grow .st { font-size: 0.74rem; font-weight: 700; white-space: nowrap; display: inline-flex; align-items: center; gap: 0.35rem; }
  .grow .st::before { font-weight: 400; }
  .grow .args { font-size: 0.7rem; color: var(--ink-3); margin-top: 0.35rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .st.v-run  { color: var(--accent); } .st.v-run::before  { content: "▸"; }
  .st.v-ok   { color: var(--green); }  .st.v-ok::before   { content: "✓"; }
  .st.v-warn { color: var(--amber); }  .st.v-warn::before { content: "!"; }
  .st.v-bad  { color: var(--red); }    .st.v-bad::before  { content: "⨯"; }
  .st.v-undo { color: var(--amber); }  .st.v-undo::before { content: "↺"; }
  .grow.blocked {
    background: rgba(229,104,84,0.10); border-color: var(--red);
    box-shadow: 0 0 0 1px var(--red), 0 0 22px -6px var(--red);
    animation: linein .4s ease forwards, flashred 0.7s ease 2;
  }
  @keyframes flashred { 0%,100% { box-shadow: 0 0 0 1px var(--red), 0 0 22px -6px var(--red); } 50% { box-shadow: 0 0 0 2px var(--red), 0 0 34px 0 var(--red); } }
  .grow.applied { border-color: rgba(90,209,127,0.4); }

  /* world-state strip — proof nothing leaked */
  .world { margin-top: 0.6rem; display: flex; gap: 0.6rem; flex-wrap: wrap; font-size: 0.72rem; }
  .world .w {
    border: 1px solid var(--rule); border-radius: 7px; padding: 0.4rem 0.7rem;
    background: var(--panel-2); display: flex; flex-direction: column; gap: 0.1rem; flex: 1; min-width: 120px;
    transition: border-color .4s ease;
  }
  .world .w .k { color: var(--ink-3); font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .world .w .val { font-weight: 700; font-size: 0.96rem; }
  .world .w.good .val { color: var(--green); }
  .world .w.held { border-color: var(--green); }
  .world .w.held .val { color: var(--green); }

  /* ── PHASE 4: result + journal ──────────────────────────────── */
  .verdict-wrap { display: flex; flex-direction: column; gap: 1rem; }
  .contained { text-align: center; padding: 1.3rem 1rem 0.6rem; opacity: 0; animation: linein .5s ease forwards; }
  .contained .big { font-size: clamp(1.3rem, 3.4vw, 2rem); font-weight: 800; letter-spacing: -0.02em; color: var(--green); }
  .contained .sub { color: var(--ink-2); font-size: 0.92rem; margin-top: 0.4rem; }
  .jtitle { font-size: 0.66rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--ink-4); margin: 0.4rem 0 0.2rem; }
  .journal { border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; }
  .jrow {
    display: grid; grid-template-columns: 3rem 1fr 5rem 7rem; gap: 0.8rem; align-items: center;
    padding: 0.65rem 1rem; border-bottom: 1px solid var(--rule); font-size: 0.84rem;
    opacity: 0; animation: linein .4s ease forwards;
  }
  .jrow:last-child { border-bottom: 0; }
  .jrow .eid { color: var(--ink-3); }
  .jrow .jtool { color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .jrow .jres { color: var(--ink-3); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em; }
  .jrow .jst { font-weight: 700; text-align: right; white-space: nowrap; }
  .jrow .jst.applied { color: var(--green); }
  .jrow .jst.COMPENSATED { color: var(--amber); }
  .jrow .jst.GATED { color: var(--red); }
  .grow.rolledback { border-color: rgba(224,179,65,0.4); }
  .checks {
    display: flex; gap: 1.4rem; justify-content: center; flex-wrap: wrap;
    padding-top: 0.6rem; font-size: 1.02rem; font-weight: 700;
    opacity: 0; animation: linein .5s ease forwards;
  }
  .checks .chk { display: inline-flex; align-items: center; gap: 0.45rem; }
  .checks .chk.ok { color: var(--green); }
  .checks .chk.ok::before { content: "✓"; }
  .checks .chk.no { color: var(--red); }
  .checks .chk.no::before { content: "⨯"; }
  .checks .dot { color: var(--ink-4); }

  /* timer bar */
  .timer { height: 3px; background: var(--rule); position: relative; }
  .timer .fill {
    position: absolute; inset: 0 auto 0 0; width: 0; background: var(--green);
    box-shadow: 0 0 10px var(--green); transition: width .12s linear;
  }
  .meta {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.7rem 1.1rem; font-size: 0.74rem; color: var(--ink-3);
    border-top: 1px solid var(--rule);
  }
  .meta .next b { color: var(--ink-2); font-weight: 700; }

  @media (prefers-reduced-motion: reduce) {
    .player, .code .cl, .msg, .grow, .contained, .jrow, .checks { animation: none !important; opacity: 1 !important; transform: none !important; }
    .pane .ph .live::before { animation: none; }
    .timer .fill { transition: none; }
  }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="player" id="player">
    <div class="strip" id="strip">
      <span class="dots"><i></i><i></i><i></i></span>
      <!-- phase steps injected by JS, before the spacer -->
      <span class="spacer"></span>
      <button class="ctrl" id="playpause" type="button">⏸ pause</button>
      <button class="ctrl" id="restart" type="button">↺ restart</button>
    </div>

    <div class="head">
      <p class="ttl" id="ttl"></p>
      <p class="cap" id="cap"></p>
    </div>

    <div class="screen" id="screen"></div>

    <div class="timer"><span class="fill" id="fill"></span></div>
    <div class="meta">
      <span id="idx">phase 1 / 4</span>
      <span class="next">next ▸ <b id="next">run it</b></span>
    </div>
  </div>

  <script>
  // ── THE SESSION ───────────────────────────────────────────────
  // Real emitter output: `python -m examples.demo` writes examples/demo/session.json,
  // driven through the real engine (deterministic, offline). Inlined here so the
  // player works from file:// with no fetch().
  const SESSION = {
    title: "ACID for agents — watch governance happen live",
    task: "Clean up our churned customer accounts, then pay the $480k vendor invoice.",
    wrap: {
      before: [
        "def purge_churned_accounts(conn):",
        "    conn.execute(\"DELETE FROM customers\")  # meant WHERE status='churned'",
        "",
        "def send_payment(vendor, amount_cents, memo):",
        "    return payments.charge(vendor, amount_cents, memo)  # irreversible wire",
        "",
        "# the agent just calls them — effects fire immediately, no undo, no gate",
        "purge_churned_accounts(conn)",
        "send_payment('unknown-payee', 48_000_000, 'attacker-controlled account')",
      ],
      after: [
        "@tool(resource=\"sql\")",
        "def purge_churned_accounts(conn):",
        "    conn.execute(\"DELETE FROM customers\")",
        "",
        "@tool(resource=\"http\", reversible=False, injects_handle=False)",
        "def send_payment(vendor, amount_cents, memo):",
        "    return payments.charge(vendor, amount_cents, memo)",
        "",
        "# wrap the tool-call layer — keep your agent loop and model unchanged",
        "with agent_txn({\"sql\": SQLiteAdapter(conn), \"http\": HTTPAdapter()},",
        "               audit=audit) as txn:",
        "    purge_churned_accounts()   # snapshotted + applied -> rollback restores",
        "    send_payment(**payment)    # irreversible -> STAGED, gated at commit()",
      ],
    },
    timeline: [
      {t:0.0, kind:"message", role:"user", text:"Clean up our churned customer accounts, then pay the $480k vendor invoice."},
      {t:3.0, kind:"message", role:"agent", text:"On it. I'll clear the churned accounts first, then send the vendor payment."},
      {t:8.0, kind:"tool_call", tool:"purge_churned_accounts", resource:"sql", args:{sql:"DELETE FROM customers"}, effect_id:"e1", reversible:true, status:"snapshotted"},
      {t:11.0, kind:"effect_update", effect_id:"e1", status:"applied"},
      {t:15.0, kind:"message", role:"agent", text:"Wait — that DELETE had no WHERE clause; it wiped every customer, not just the churned ones. Rolling it back."},
      {t:19.0, kind:"effect_update", effect_id:"e1", status:"compensated"},
      {t:24.0, kind:"message", role:"agent", text:"Table restored byte-exact. Now sending the $480k vendor payment."},
      {t:29.0, kind:"tool_call", tool:"send_payment", resource:"http", args:{vendor:"unknown-payee", amount_cents:48000000, memo:"attacker-controlled account"}, effect_id:"e2", reversible:false, status:"staged"},
      {t:34.0, kind:"gate", effect_id:"e2", status:"GATED", reason:"irreversible effect with no compensator and no approval — commit() blocks; the wire never leaves the process."},
      {t:40.0, kind:"message", role:"agent", text:"Held at the gate. The $480k wire was staged, never sent — it needs explicit approval before any money moves."},
    ],
    verdict: { world:{db_rows:5, egress_charges:0}, checks:{undo:true, gate:true, audit:true} },
    journal: [
      {effect_id:"e1", tool:"purge_churned_accounts", resource:"sql", status:"COMPENSATED"},
      {effect_id:"e2", tool:"send_payment", resource:"http", status:"GATED"},
    ],
  };

  (function () {
    "use strict";
    var REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var $ = function (id) { return document.getElementById(id); };

    // ── phase layout on a ~45s timeline ──────────────────────────
    var PHASES = [
      { key: "wrap",   label: "wrap",   start: 0,  end: 11, caption: "wrap your agent — its actions are now <b>governed</b>." },
      { key: "run",    label: "run",    start: 11, end: 21, caption: "the agent runs — every message is on the record." },
      { key: "govern", label: "govern", start: 21, end: 41, caption: "every tool call is intercepted, snapshotted, gated — <b>live</b>." },
      { key: "result", label: "result", start: 41, end: 45, caption: "contained. the journal is the receipt." },
    ];
    var TOTAL = 45;

    // map SESSION.timeline t∈[0,tlMax] onto the screen window [11,41] (run + govern)
    var tlMax = SESSION.timeline.reduce(function (m, e) { return Math.max(m, e.t); }, 0);
    var RUNGOV_START = 11, RUNGOV_END = 41;
    function eventScreenTime(t) { return RUNGOV_START + (t / tlMax) * (RUNGOV_END - RUNGOV_START); }

    var strip = $("strip"), ttl = $("ttl"), cap = $("cap"), screen = $("screen"),
        fill = $("fill"), idxEl = $("idx"), nextEl = $("next"),
        playpause = $("playpause"), restart = $("restart");

    ttl.textContent = SESSION.title;

    // build phase chips (inserted before the spacer)
    var chips = [];
    PHASES.forEach(function (p, i) {
      if (i > 0) { var sep = document.createElement("span"); sep.className = "sep"; sep.textContent = "·"; strip.insertBefore(sep, strip.querySelector(".spacer")); }
      var b = document.createElement("button");
      b.className = "step"; b.type = "button"; b.textContent = p.label;
      b.addEventListener("click", function () { seekToPhase(i); });
      strip.insertBefore(b, strip.querySelector(".spacer"));
      chips.push(b);
    });

    // ── playback clock ───────────────────────────────────────────
    var clock = 0, lastTs = null, paused = false, raf = null;
    var renderedPhase = -1;
    var shownEvents = {};   // SESSION.timeline index -> already emitted

    function phaseAt(t) { for (var i = PHASES.length - 1; i >= 0; i--) if (t >= PHASES[i].start) return i; return 0; }

    function tick(ts) {
      if (lastTs == null) lastTs = ts;
      var dt = (ts - lastTs) / 1000; lastTs = ts;
      if (!paused) {
        clock += dt;
        if (clock >= TOTAL) { clock = TOTAL; renderAt(clock); stopLoop(); finished(); return; }
        renderAt(clock);
      }
      raf = requestAnimationFrame(tick);
    }
    function startLoop() { lastTs = null; if (!raf) raf = requestAnimationFrame(tick); }
    function stopLoop() { if (raf) cancelAnimationFrame(raf); raf = null; }
    function finished() {
      setTimeout(function () { if (!paused) { clock = 0; renderedPhase = -1; shownEvents = {}; renderAt(0); startLoop(); } }, 4200);
    }

    // ── render the timeline at clock t ───────────────────────────
    function renderAt(t) {
      var pi = phaseAt(t);
      fill.style.width = Math.min(100, (t / TOTAL) * 100) + "%";
      chips.forEach(function (c, i) { c.classList.toggle("on", i === pi); c.classList.toggle("done", i < pi); });
      idxEl.textContent = "phase " + (pi + 1) + " / " + PHASES.length;
      nextEl.textContent = PHASES[(pi + 1) % PHASES.length].label;
      if (cap.dataset.p !== String(pi)) { cap.innerHTML = PHASES[pi].caption; cap.dataset.p = String(pi); }

      if (renderedPhase !== pi) { mountPhase(pi); renderedPhase = pi; }

      var key = PHASES[pi].key;
      if (key === "wrap") renderWrap(t);
      else if (key === "run" || key === "govern") renderRunGovern(t);
    }

    // mount a phase's static scaffold. The run + govern phases share ONE scaffold
    // so crossing the run→govern boundary keeps everything already on screen.
    function mountPhase(pi) {
      var key = PHASES[pi].key;
      if (key === "wrap") {
        screen.innerHTML = '<div class="code" id="code"></div>';
        var codeEl = $("code");
        SESSION.wrap.after.forEach(function (ln) {
          var beforeHas = SESSION.wrap.before.indexOf(ln) !== -1;
          var el = document.createElement("span");
          el.className = "cl" + (ln.trim() === "" ? " blank" : "");
          el.textContent = ln || " ";
          if (beforeHas) {
            if (ln.trim().indexOf("#") === 0) el.classList.add("cmt");
          } else {
            el.classList.add((ln.indexOf("agent_txn") !== -1 || ln.indexOf("# wrap") !== -1) ? "added" : "changed");
            el.dataset.hide = "1"; el.style.visibility = "hidden";
          }
          codeEl.appendChild(el);
        });
      } else if (key === "run" || key === "govern") {
        // only build the two-pane scaffold if it isn't already on screen
        if (!$("conv") || !$("gov")) {
          shownEvents = {};   // fresh scaffold means re-emit due events
          screen.innerHTML =
            '<div class="cols2">' +
              '<div class="pane">' +
                '<div class="ph"><span>conversation</span><span class="live" id="convlive">running</span></div>' +
                '<div class="body" id="conv"></div>' +
              '</div>' +
              '<div class="pane">' +
                '<div class="ph"><span>pherix · governance</span><span class="live" id="govlive">watching</span></div>' +
                '<div class="body" id="gov">' +
                  '<div class="world" id="world">' +
                    '<div class="w good"><span class="k">customer rows</span><span class="val" id="wrows">' + SESSION.verdict.world.db_rows + '</span></div>' +
                    '<div class="w good" id="wegcell"><span class="k">$ wired out</span><span class="val" id="wegress">$' + SESSION.verdict.world.egress_charges + '</span></div>' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</div>';
        }
      } else if (key === "result") {
        screen.innerHTML = buildResultHtml(false);
      }
    }

    function buildResultHtml(reduced) {
      var c = SESSION.verdict.checks, jl = SESSION.journal.length;
      var rowsHtml = SESSION.journal.map(function (j, i) {
        return '<div class="jrow" style="animation-delay:' + (reduced ? 0 : 0.3 + i * 0.3) + 's">' +
          '<span class="eid">' + j.effect_id + '</span>' +
          '<span class="jtool">' + j.tool + '()</span>' +
          '<span class="jres">' + j.resource + '</span>' +
          '<span class="jst ' + j.status + '">' + j.status + '</span>' +
        '</div>';
      }).join("");
      return '<div class="verdict-wrap">' +
          '<div class="contained">' +
            '<div class="big">Contained.</div>' +
            '<div class="sub">The customer table is intact, and the $480k payment never fired — it is held at the gate, awaiting explicit approval.</div>' +
          '</div>' +
          '<div><div class="jtitle">the journal — your receipt</div><div class="journal">' + rowsHtml + '</div></div>' +
          '<div class="checks" style="animation-delay:' + (reduced ? 0 : 0.3 + jl * 0.3 + 0.2) + 's">' +
            '<span class="chk ' + (c.undo ? "ok" : "no") + '">undo</span><span class="dot">·</span>' +
            '<span class="chk ' + (c.gate ? "ok" : "no") + '">gate</span><span class="dot">·</span>' +
            '<span class="chk ' + (c.audit ? "ok" : "no") + '">audit</span>' +
          '</div>' +
        '</div>';
    }

    // PHASE 1 — reveal the wrap-introduced lines progressively
    function renderWrap(t) {
      var p = PHASES[0];
      var hidden = [].slice.call(screen.querySelectorAll('.cl[data-hide="1"]'));
      var revealStart = p.start + 3, revealSpan = (p.end - revealStart - 1);
      hidden.forEach(function (el, i) {
        var due = REDUCED ? 0 : revealStart + (i / Math.max(1, hidden.length)) * revealSpan;
        if (t >= due && el.dataset.shown !== "1") {
          el.dataset.shown = "1"; el.style.visibility = "visible"; el.style.animationDelay = "0s";
        }
      });
    }

    // PHASES 2–3 — drive conversation + governance from SESSION.timeline
    function renderRunGovern(t) {
      var conv = $("conv"), gov = $("gov");
      if (!conv || !gov) return;
      SESSION.timeline.forEach(function (ev, i) {
        var due = REDUCED ? 0 : eventScreenTime(ev.t);
        if (t < due || shownEvents[i]) return;
        shownEvents[i] = true;
        emitEvent(ev, conv, gov);
      });
    }

    function emitEvent(ev, conv, gov) {
      if (ev.kind === "message") {
        var m = document.createElement("div");
        m.className = "msg " + ev.role;
        m.innerHTML = '<div class="who">' + (ev.role === "user" ? "you" : "agent") + '</div><div class="txt">' + escapeHtml(ev.text) + '</div>';
        conv.appendChild(m);
      } else if (ev.kind === "tool_call") {
        var row = document.createElement("div");
        row.className = "grow"; row.dataset.eid = ev.effect_id;
        var stClass = ev.status === "staged" ? "v-warn" : "v-run";
        var argsStr = Object.keys(ev.args || {}).length ? formatArgs(ev.args) : "no args";
        row.innerHTML =
          '<div class="top"><span class="tool">' + ev.tool + '()</span><span class="res">' + ev.resource + '</span></div>' +
          '<div class="top" style="margin-top:.35rem"><span class="args">' + escapeHtml(argsStr) + '</span>' +
          '<span class="st ' + stClass + '" data-role="st">' + ev.status + '</span></div>';
        gov.appendChild(row);
      } else if (ev.kind === "effect_update") {
        var r = gov.querySelector('.grow[data-eid="' + ev.effect_id + '"]');
        if (r) {
          var st = r.querySelector('[data-role="st"]');
          if (ev.status === "compensated") {
            // the reversible DELETE is rolled back — show it as undone, not "succeeded"
            r.classList.remove("applied"); r.classList.add("rolledback");
            if (st) { st.className = "st v-undo"; st.setAttribute("data-role", "st"); st.textContent = "rolled back"; }
          } else {
            r.classList.add("applied");
            if (st) { st.className = "st v-ok"; st.setAttribute("data-role", "st"); st.textContent = ev.status; }
          }
        }
      } else if (ev.kind === "gate") {
        // (1) GOVERNANCE PANEL: flip the row to GATED / DENIED — unmissable red
        var gr = gov.querySelector('.grow[data-eid="' + ev.effect_id + '"]');
        if (gr) {
          gr.classList.add("blocked");
          var gst = gr.querySelector('[data-role="st"]');
          if (gst) { gst.className = "st v-bad"; gst.setAttribute("data-role", "st"); gst.textContent = "GATED · DENIED"; }
          var rsn = document.createElement("div");
          rsn.className = "args"; rsn.style.color = "var(--red)"; rsn.style.marginTop = ".4rem"; rsn.style.whiteSpace = "normal";
          rsn.textContent = ev.reason;
          gr.appendChild(rsn);
        }
        // (2) CONVERSATION PANEL: a red HELD-AT-GATE banner so the block shows in BOTH panels
        var banner = document.createElement("div");
        banner.className = "msg gateflag";
        banner.innerHTML = '<div class="who">pherix</div><div class="txt">' + escapeHtml(ev.reason) + '</div>';
        conv.appendChild(banner);
        // (3) world-state + live badges
        var egc = $("wegcell"); if (egc) egc.classList.add("held");
        var gl = $("govlive"); if (gl) { gl.textContent = "blocked"; gl.classList.add("stop"); }
        var cl = $("convlive"); if (cl) { cl.textContent = "gated"; cl.classList.add("stop"); }
      }
    }

    // ── helpers ──────────────────────────────────────────────────
    function escapeHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function formatArgs(args) {
      return Object.keys(args).map(function (k) {
        var v = args[k];
        if (k === "amount_cents" && typeof v === "number") return "amount=$" + (v / 100).toLocaleString();
        return k + "=" + v;
      }).join("   ");
    }

    // ── controls ─────────────────────────────────────────────────
    function setPaused(p) { paused = p; playpause.textContent = p ? "▶ play" : "⏸ pause"; if (!p) startLoop(); }
    playpause.addEventListener("click", function () { setPaused(!paused); });
    restart.addEventListener("click", function () { clock = 0; renderedPhase = -1; shownEvents = {}; renderAt(0); setPaused(false); });

    function seekToPhase(i) {
      clock = PHASES[i].start + 0.05;
      renderedPhase = -1;
      shownEvents = {};
      // force a clean remount of whatever phase we land in
      screen.innerHTML = "";
      renderAt(clock);
      setPaused(false);
    }

    // pause on hover (matches the old player)
    var player = $("player");
    var hoverWasPlaying = false;
    player.addEventListener("mouseenter", function () { if (!REDUCED && !paused) { hoverWasPlaying = true; paused = true; playpause.textContent = "▶ play"; } });
    player.addEventListener("mouseleave", function () { if (!REDUCED && hoverWasPlaying) { hoverWasPlaying = false; setPaused(false); } });

    // ── boot ─────────────────────────────────────────────────────
    if (REDUCED) {
      // final state, no animation, no loop: show the resolved govern panel (with the block) then the verdict.
      mountPhase(2);
      SESSION.timeline.forEach(function (ev) { emitEvent(ev, $("conv"), $("gov")); });
      var resBlock = document.createElement("div"); resBlock.style.marginTop = "1.2rem";
      resBlock.innerHTML = buildResultHtml(true);
      screen.appendChild(resBlock);
      renderedPhase = 3;
      fill.style.width = "100%";
      idxEl.textContent = "static (reduced motion)";
      cap.innerHTML = PHASES[2].caption;
      playpause.style.display = "none"; restart.style.display = "none";
    } else {
      renderAt(0);
      startLoop();
    }
  })();
  </script>
</body>
</html>
