[project]
name = "pherix"
version = "0.0.0"
description = "A transactional resource runtime for AI agents"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = ["pytest"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pherix"]

[tool.pytest.ini_options]
testpaths = ["tests"]
